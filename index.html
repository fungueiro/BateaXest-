const descargarCSV = (nombre, headers, rows) => {
  const csv = "﻿" + [headers.map(csvEsc).join(";"), ...rows.map((r) => r.map(csvEsc).join(";"))].join("\r\n");

// ─── Utilidades batea ─────────────────────────────────────────────────────
// celdas: { "fila-col": categoria } · extra: cuerdas sin ubicar por categoría
const nuevaBatea = (id, nombre, ancho, largo) => ({
  id, nombre, ancho, largo, celdas: {}, lotes: {}, bloq: {}, extra: { colectora: 0, desdoble: 0, venta: 0 },
});
const cap = (b) => b.ancho * b.largo - Object.keys(b.bloq || {}).length;
const nCeldas = (b, cat) => Object.values(b.celdas).filter((c) => !cat || c === cat).length;
const stock = (b, cat) => nCeldas(b, cat) + b.extra[cat];
const ocup = (b) => nCeldas(b) + CATS.reduce((s, c) => s + b.extra[c], 0);
const extraTot = (b) => CATS.reduce((s, c) => s + b.extra[c], 0);
const libres = (b) => cap(b) - ocup(b);
// Límite lógico por batea (independiente del nº de celdas)
const LIM_PROD = 500; // venta + mexilla/desdoble
const LIM_COL = 100;  // colectora
const exceso = (b) => {
  const prod = stock(b, "venta") + stock(b, "desdoble");
  const col = stock(b, "colectora");
  const av = [];
  if (prod > LIM_PROD) av.push({ tipo: "venta + mexilla/desdoble", n: prod - LIM_PROD, lim: LIM_PROD, actual: prod });
  if (col > LIM_COL) av.push({ tipo: "colectora", n: col - LIM_COL, lim: LIM_COL, actual: col });
  return av;
};
const capLog = () => LIM_PROD + LIM_COL; // tope lógico de cuerdas por batea (500 + 100)
const clon = (bs) => bs.map((b) => ({ ...b, celdas: { ...b.celdas }, lotes: { ...b.lotes }, bloq: { ...b.bloq }, extra: { ...b.extra } }));

function seed(id, nombre, fill) {

  for (const [cat, n] of fill) for (let k = 0; k < n; k++, i++) b.celdas[`${Math.floor(i / 20)}-${i % 20}`] = cat;
  return b;
}

const BarChart = ({ data, valueKey, color }) => {
  const max = Math.max(1, ...data.map((d) => d[valueKey]));
  const w = 700, h = 160, padL = 6, padB = 22;
  const bw = data.length ? (w - padL) / data.length : 0;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: 140 }}>
      <line x1={padL} y1={h - padB} x2={w} y2={h - padB} stroke={C.line} strokeWidth="1" />
      {data.map((d, i) => {
        const bh = (d[valueKey] / max) * (h - padB - 16);
        const x = padL + i * bw + bw * 0.15, bwid = bw * 0.7, y = h - padB - bh;
        return (
          <g key={d.m}>
            <rect x={x} y={y} width={bwid} height={Math.max(bh, 1)} fill={color} rx={2} />
            <text x={x + bwid / 2} y={h - padB + 13} textAnchor="middle" fontSize="9" fill={C.mut}>{d.m.slice(5)}/{d.m.slice(2, 4)}</text>
          </g>
        );
      })}
    </svg>
  );
};

// ─── Rejilla posicional ───────────────────────────────────────────────────
function Grid({ b, sel, onCell, elegible, info, maxW = 340 }) {
  const size = 12, gap = 2;
  const [drag, setDrag] = useState(null); // 'add' | 'del'
  const [tip, setTip] = useState(null); // {x, y, txt}
  // Borde distinto por lote solo si >1 lote de la misma categoría en la batea
  const loteStroke = useMemo(() => {
    const PAL = ["#FFFFFF", "#FFD166", "#EF476F", "#06D6A0", "#9b5de5", "#F78C6B"];
    const byCat = {};
    for (const [k, cat] of Object.entries(b.celdas)) {
      const id = b.lotes?.[k] ?? "init";
      (byCat[cat] = byCat[cat] || new Set()).add(id);
    }
    const m = {};
    for (const [cat, ids] of Object.entries(byCat)) {
      if (ids.size < 2) continue;
      [...ids].sort().forEach((id, i) => { m[cat + "|" + id] = PAL[i % PAL.length]; });
    }
    return m;
  }, [b]);
  const w = b.ancho * (size + gap), h = b.largo * (size + gap);
  const MIN_CELL = 13; // px mínimos por celda en pantalla
  const pxAncho = Math.max(maxW, b.ancho * MIN_CELL); // si no caben, el grid crece y se hace scroll
  const okK = (k) => {
    const cat = b.celdas[k], blq = b.bloq?.[k];
    return !!onCell && !blq && (!elegible || elegible(k, cat, blq));
  };
  const touchK = (e) => {
    const t = e.touches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    return el?.getAttribute?.("data-k") || null;
  };
  const onTS = onCell ? (e) => {
    const k = touchK(e);
    if (k && okK(k)) { const m = sel?.has(k) ? "del" : "add"; setDrag(m); onCell(k, m); }
  } : undefined;
  const onTM = onCell ? (e) => {
    if (!drag) return;
    const k = touchK(e);
    if (k && okK(k)) onCell(k, drag);
  } : undefined;
  return (
    <div style={{ overflowX: pxAncho > maxW ? "auto" : "visible", maxWidth: maxW, WebkitOverflowScrolling: "touch" }}>
    <div style={{ position: "relative", width: pxAncho > maxW ? pxAncho : "auto", maxWidth: pxAncho > maxW ? "none" : maxW }}>
    {tip && <div style={{ position: "absolute", left: tip.x, top: tip.y, transform: "translate(-50%,-115%)",
      background: "#0B1B26", color: "#E8F1F5", border: "1px solid #2A4A5E", borderRadius: 6,
      padding: "4px 8px", fontSize: 12, whiteSpace: "nowrap", pointerEvents: "none", zIndex: 5 }}>{tip.txt}</div>}
    <svg viewBox={`0 0 ${w} ${h}`}
      style={{ width: "100%", display: "block", userSelect: "none", touchAction: onCell ? "none" : "auto" }}
      onMouseUp={() => setDrag(null)} onMouseLeave={() => { setDrag(null); setTip(null); }}
      onTouchStart={onTS} onTouchMove={onTM}
      onTouchEnd={() => setDrag(null)} onTouchCancel={() => setDrag(null)}>
      {Array.from({ length: b.largo }, (_, r) =>
        Array.from({ length: b.ancho }, (_, c) => {
          const k = `${r}-${c}`, cat = b.celdas[k], blq = b.bloq?.[k];
          const ls = cat ? loteStroke[cat + "|" + (b.lotes?.[k] ?? "init")] : null;
          const ok = elegible ? elegible(k, cat, blq) : false;
          const isSel = sel?.has(k);
          return (
            <rect key={k} data-k={k} x={c * (size + gap)} y={r * (size + gap)} width={size} height={size} rx={2}
              fill={blq ? "#050E14" : cat ? CAT[cat].color : C.line}
              stroke={isSel ? C.sel : ls || "none"} strokeWidth={isSel ? 2.5 : ls ? 1.3 : 0}
              opacity={elegible && !ok && !isSel ? 0.3 : 1}
              style={{ cursor: ok ? "pointer" : "default" }}
              onMouseDown={ok ? () => { const m = sel?.has(k) ? "del" : "add"; setDrag(m); onCell(k, m); } : undefined}
              onMouseEnter={(e) => { if (ok && drag) onCell(k, drag);
                if (info && cat) { const rb = e.currentTarget.closest("div").getBoundingClientRect(), r2 = e.currentTarget.getBoundingClientRect();
                  setTip({ x: r2.left - rb.left + r2.width / 2, y: r2.top - rb.top, txt: info(k, cat) }); }
                else setTip(null); }}
              onMouseLeave={() => setTip(null)} />
          );
        })
      )}
    </svg>
    </div>
    </div>
  );
}

// ─── Arranque: configuración de Firebase, carga y sesión ──────────────────
const Pantalla = ({ children }) => (
  <div style={{ minHeight: "100vh", background: C.ink, color: C.text, fontFamily: "Inter, sans-serif", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
    <div style={{ maxWidth: 460, width: "100%", background: C.panel, border: `1px solid ${C.line}`, borderRadius: 10, padding: 24 }}>{children}</div>
  </div>
);

function ConfigSetup({ onSaved, onCancel }) {
  const [texto, setTexto] = useState("");
  const [error, setError] = useState("");
  const guardar = () => {
    try {
      const limpio = texto.trim().replace(/^const\s+firebaseConfig\s*=\s*/, "").replace(/;\s*$/, "");
      const cfg = new Function(`"use strict"; return (${limpio});`)();
      if (!cfg || !cfg.apiKey || !cfg.projectId) throw new Error("faltan apiKey / projectId");
      localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
      onSaved(cfg);
    } catch (e) {
      setError("No se pudo interpretar la configuración (" + e.message + "). Pega el objeto tal cual lo da la consola de Firebase.");
    }
  };
  const usarPorDefecto = () => { localStorage.removeItem(CONFIG_KEY); onSaved(FIREBASE_CONFIG); };
  return (
    <Pantalla>
      <h1 style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 24, letterSpacing: "0.05em", textTransform: "uppercase", margin: "0 0 10px" }}>Configurar Firebase</h1>
      <p style={{ color: C.mut, fontSize: 13, margin: "0 0 12px" }}>
        Pega aquí el objeto <code>firebaseConfig</code> de tu proyecto (consola de Firebase → Configuración del proyecto → Tus apps → app web).
      </p>
      <textarea style={{ ...inp, minHeight: 150, fontFamily: "monospace", resize: "vertical" }} value={texto} onChange={(e) => setTexto(e.target.value)}
        placeholder={'{\n  apiKey: "…",\n  authDomain: "…",\n  projectId: "…",\n  storageBucket: "…",\n  messagingSenderId: "…",\n  appId: "…"\n}'} />
      {error && <p style={{ color: C.warn, fontSize: 13, marginTop: 8 }}>{error}</p>}
      <div style={{ display: "flex", gap: 10, marginTop: 14, flexWrap: "wrap" }}>
        <button style={btn(true)} onClick={guardar}>Guardar y continuar</button>
        <button style={mini()} onClick={usarPorDefecto}>Usar la del proyecto por defecto</button>
        {onCancel && <button style={mini()} onClick={onCancel}>Cancelar</button>}
      </div>
    </Pantalla>
  );
}

const Cargando = ({ texto }) => (
  <Pantalla><p style={{ color: C.mut, fontSize: 14, margin: 0 }}>{texto || "Cargando…"}</p></Pantalla>
);

// Red de seguridad: si algo peta durante el render, mostramos un mensaje en vez de pantalla en blanco.
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  render() {
    if (!this.state.err) return this.props.children;
    return (
      <Pantalla>
        <h1 style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 22, letterSpacing: "0.05em", textTransform: "uppercase", margin: "0 0 8px", color: C.warn }}>Se ha producido un error</h1>
        <p style={{ color: C.text, fontSize: 14, margin: "0 0 8px" }}>
          Tus datos están a salvo en la nube (se guardó el último cambio correcto). Recarga la página para continuar.
        </p>
        <p style={{ color: C.mut, fontSize: 12, margin: "0 0 14px", fontFamily: "monospace", wordBreak: "break-word" }}>{String(this.state.err && this.state.err.message || this.state.err)}</p>
        <button style={btn(true)} onClick={() => location.reload()}>Recargar</button>
      </Pantalla>
    );
  }
}

function Login({ onReconfig }) {
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [error, setError] = useState("");
  const [cargando, setCargando] = useState(false);
  const entrar = async () => {
    setError(""); setCargando(true);
    try { await firebase.auth().signInWithEmailAndPassword(email, pass); }
    catch (e) { setError(mensajeErrorAuth(e.code)); }
    setCargando(false);
  };
  const onKey = (e) => { if (e.key === "Enter") entrar(); };
  return (
    <Pantalla>
      <h1 style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 26, letterSpacing: "0.06em", textTransform: "uppercase", margin: "0 0 4px" }}>Cuaderno de Batea</h1>
      <p style={{ color: C.mut, fontSize: 13, margin: "0 0 16px" }}>Inicia sesión para continuar.</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        <Field label="Email"><input style={inp} type="email" autoComplete="username" value={email} onChange={(e) => setEmail(e.target.value)} onKeyDown={onKey} /></Field>
        <Field label="Contraseña"><input style={inp} type="password" autoComplete="current-password" value={pass} onChange={(e) => setPass(e.target.value)} onKeyDown={onKey} /></Field>
      </div>
      {error && <p style={{ color: C.warn, fontSize: 13, marginTop: 10 }}>{error}</p>}
      <button style={{ ...btn(true), marginTop: 14 }} disabled={cargando} onClick={entrar}>{cargando ? "Entrando…" : "Entrar"}</button>
      <div>
        <button style={{ ...mini(), marginTop: 12 }} onClick={onReconfig}>Cambiar configuración de Firebase</button>
      </div>
    </Pantalla>
  );
}

function Root() {
  // Config fija por defecto; se puede sobreescribir desde la pantalla de configuración (localStorage manda).
  const [cfg, setCfg] = useState(() => {
    try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || "null") || FIREBASE_CONFIG; } catch { return FIREBASE_CONFIG; }
  });
  const [reconfig, setReconfig] = useState(false);
  const [user, setUser] = useState(undefined); // undefined = comprobando sesión, null = sin sesión

  useEffect(() => {
    if (!cfg) return;
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    try { firebase.firestore().settings({ ignoreUndefinedProperties: true }); } catch (e) {}
    const unsub = firebase.auth().onAuthStateChanged(setUser);
    return unsub;
  }, [cfg]);

  if (reconfig || !cfg) return <ConfigSetup onSaved={(c) => { setReconfig(false); setCfg(c); }} onCancel={cfg ? () => setReconfig(false) : null} />;
  if (user === undefined) return <Cargando texto="Comprobando sesión…" />;
  if (!user) return <Login onReconfig={() => setReconfig(true)} />;
  return <ErrorBoundary><GestionBatea db={firebase.firestore()} /></ErrorBoundary>;
}

function GestionBatea({ db }) {
