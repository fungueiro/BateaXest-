  // ── Persistencia en Firestore (un único documento con todo el estado) ──
  const docRef = useMemo(() => db.collection("cuaderno").doc("estado"), [db]);
  const hydratedRef = useRef(false);
  const lastSyncRef = useRef("");
  const [cargandoDatos, setCargandoDatos] = useState(true);

  useEffect(() => {
    const unsub = docRef.onSnapshot((snap) => {
      if (snap.exists) {
        const d = snap.data() || {};
        const datos = {
          bateas: d.bateas || [], ops: d.ops || [], ventas: d.ventas || [],
          personas: d.personas || ["Román"], compradores: d.compradores || ["Udana"],
          limMeses: d.limMeses || LIM_MESES_DEFECTO,
        };
        lastSyncRef.current = JSON.stringify(datos);
        setBateas(datos.bateas); setOps(datos.ops); setVentas(datos.ventas);
        setPersonas(datos.personas); setCompradores(datos.compradores); setLimMeses(datos.limMeses);
      } else {
        // Primera vez que se usa esta base de datos: sembramos con los datos de ejemplo.
        const inicial = { bateas: seedBateas, ops: [], ventas: [], personas: ["Román"], compradores: ["Udana"], limMeses: LIM_MESES_DEFECTO };
        lastSyncRef.current = JSON.stringify(inicial);
        docRef.set(inicial);
      }
      hydratedRef.current = true;
      setCargandoDatos(false);
    }, (err) => {
      flash("Error de conexión con la base de datos: " + err.message);
      hydratedRef.current = true;
      setCargandoDatos(false);
    });
    return unsub;
  }, [docRef]);

  useEffect(() => {
    if (!hydratedRef.current) return;
    const payload = { bateas, ops, ventas, personas, compradores, limMeses };
    const json = JSON.stringify(payload);
    if (json === lastSyncRef.current) return;
    lastSyncRef.current = json;
    const t = setTimeout(() => {
      docRef.set(payload).catch((e) => flash("No se pudo guardar en la base de datos: " + e.message));
    }, 600);
    return () => clearTimeout(t);
  }, [bateas, ops, ventas, personas, compradores, limMeses, docRef]);
  const loteInfo = (b) => (k, cat) => {
    const op = ops.find((x) => x.id === b.lotes?.[k]);
    if (!op) return `${CAT[cat].label} · lote inicial`;
    return `${CAT[cat].label} · ${op.fecha}${op.nota ? " · " + op.nota : ""}`;
  };

  // ── Edición de batea ──
  const [edit, setEdit] = useState(null); // {id, nombre, ancho, largo}
  const saveEdit = () => {
    const a = parseInt(edit.ancho), l = parseInt(edit.largo);
    if (!edit.nombre || !a || !l) return flash("Nombre, ancho y largo requeridos.");
    pushHistorial(`Editar batea "${edit.nombre}"`);
    setBateas(bateas.map((b) => {
      if (b.id !== edit.id) return b;
      const nb = { ...b, nombre: edit.nombre, ancho: a, largo: l, celdas: {}, lotes: {}, bloq: {}, extra: { ...b.extra } };
      let fuera = 0, flotFuera = 0;
      for (const [k, cat] of Object.entries(b.celdas)) {
        const [r, c] = k.split("-").map(Number);
        if (r < l && c < a) { nb.celdas[k] = cat; if (b.lotes?.[k]) nb.lotes[k] = b.lotes[k]; }
        else { nb.extra[cat]++; fuera++; }
      }
      for (const k of Object.keys(b.bloq || {})) {
        const [r, c] = k.split("-").map(Number);
        if (r < l && c < a) nb.bloq[k] = true; else flotFuera++;
      }
      if (fuera || flotFuera) flash(`${nb.nombre}: ${fuera ? fuera + " cuerdas sin ubicar" : ""}${fuera && flotFuera ? " · " : ""}${flotFuera ? flotFuera + " flotadores fuera del nuevo tamaño (eliminados)" : ""}.`);
      return nb;
    }));
    setEdit(null);
  };
  const [delBatea, setDelBatea] = useState(null); // id pendiente de confirmar
  const borrarBatea = (id) => {
    pushHistorial(`Eliminar batea "${bn(id)}"`);
    setBateas(bateas.filter((b) => b.id !== id));
    setEdit(null); setDelBatea(null);
    flash("Batea eliminada. Su inventario de cuerdas se pierde; operaciones y ventas históricas se conservan.");
  };

  // ── Flotadores (celdas anuladas permanentemente) ──
  const [flot, setFlot] = useState(null); // { bateaId, sel:Set }
  const abrirFlot = (b) => setFlot({ bateaId: b.id, sel: new Set(Object.keys(b.bloq || {})) });

  // ── Recolocación: mover cuerdas de celda y ubicar las "sin ubicar" ──
  const [reub, setReub] = useState(null); // {bateaId, sel:Set, cat}
  const reubCell = (k, modo) => {
    const bs = clon(bateas);
    const b = bs.find((x) => x.id === reub.bateaId);
    if (b.bloq?.[k]) return;
    if (reub.cat) { // modo ubicar extra
      if (!b.celdas[k] && b.extra[reub.cat] > 0) {
        b.celdas[k] = reub.cat; b.extra[reub.cat]--;
        setBateas(bs);
        if (b.extra[reub.cat] === 0) setReub({ ...reub, cat: null });
      }
      return;
    }
    if (b.celdas[k]) { // seleccionar/deseleccionar orígenes (drag soportado)
      const sel = new Set(reub.sel);
      modo === "del" ? sel.delete(k) : sel.add(k);
      setReub({ ...reub, sel });
      return;
    }
    if (reub.sel.size) { // celda libre: mueve la primera del grupo (orden de selección)
      const from = reub.sel.values().next().value;
      b.celdas[k] = b.celdas[from]; delete b.celdas[from];
      if (b.lotes?.[from] != null) { b.lotes[k] = b.lotes[from]; delete b.lotes[from]; }
      const sel = new Set(reub.sel); sel.delete(from);
      setBateas(bs); setReub({ ...reub, sel });
    }
  };
  const flotCell = (k, modo) => setFlot((f) => {
    const s = new Set(f.sel);
    modo === "del" ? s.delete(k) : s.add(k);
    return { ...f, sel: s };
  });
  const saveFlot = () => {
    pushHistorial(`Flotadores — ${bn(flot.bateaId)}`);
    setBateas(bateas.map((b) => b.id === flot.bateaId
      ? { ...b, bloq: Object.fromEntries([...flot.sel].map((k) => [k, true])) } : b));
    setFlot(null);
  };

  // ── Alta de batea ──
  const [nb, setNb] = useState({ nombre: "", ancho: "", largo: "" });
  const addBatea = () => {
    const a = parseInt(nb.ancho), l = parseInt(nb.largo);
    if (!nb.nombre || !a || !l) return flash("Nombre, ancho y largo requeridos.");
    pushHistorial(`Añadir batea "${nb.nombre}"`);
    const b = nuevaBatea(Date.now(), nb.nombre, a, l);
    setBateas([...bateas, b]);
    setNb({ nombre: "", ancho: "", largo: "" });
    setFlot({ bateaId: b.id, sel: new Set() });
  };

  // ── Formulario de operación ──
  const [op, setOp] = useState({
    tipo: "siembra", fecha: hoy(), bateaId: 1, bateaDestId: 2,
    cat: "colectora", catDest: "desdoble", n: "", nDest: "", nota: "", dir: "quitar",
    vmodo: "sacos", vsacos: "", vkg: "", vdesct: "", veur: "", vpersona: "", vcomprador: "",
  });
  // El desplegable de batea guarda un id fijo (1/2 por defecto). Si esas bateas no existen
  // (datos propios cargados de la nube), el id queda "colgado" y provoca errores al operar.
  // Este efecto reengancha bateaId/bateaDestId a bateas reales cuando cambia la lista.
  useEffect(() => {
    if (!bateas.length) return;
    const ids = bateas.map((b) => b.id);
    setOp((o) => {
      let n = o;
      if (!ids.includes(+o.bateaId)) n = { ...n, bateaId: bateas[0].id };
      if (!ids.includes(+n.bateaDestId)) n = { ...n, bateaDestId: (bateas[1] || bateas[0]).id };
      return n;
    });
  }, [bateas]);

  // ── Colocación (tras Registrar lote) ──
  // pend: { op, fases:[{modo:'quitar'|'poner', bateaId, cat, n}], fase, sel:Set, origen:{} }
  const [pend, setPend] = useState(null);
  // ── Ficha de trazabilidad de lote (opId abierto) ──
  const [verLote, setVerLote] = useState(null);

  // ── Deshacer: pila multi-nivel de acciones (plano, operaciones y ventas) ──
  const [historial, setHistorial] = useState([]); // [{label, bateas, ops, ventas}]
  const pushHistorial = (label) => setHistorial((h) => [...h.slice(-(MAX_UNDO - 1)), { label, bateas: clon(bateas), ops, ventas }]);
  const deshacerUltimo = () => {
    setHistorial((h) => {
      if (!h.length) return h;
      const last = h[h.length - 1];
      setBateas(last.bateas); setOps(last.ops); setVentas(last.ventas);
      flash(`Deshecho: ${last.label}.`);
      return h.slice(0, -1);
    });
  };

  // ── Edición / borrado de registros de operación ──
  const [delOp, setDelOp] = useState(null);
  const [editOp, setEditOp] = useState(null); // {id, fecha, nota} — no toca el plano
  const borrarOp = (id) => {
    const op0 = ops.find((x) => x.id === id);
    const vLig = ventas.find((x) => x.opId === id);
    pushHistorial(`Eliminar operación (${TIPO_LABEL[op0?.tipo] || "?"})`);
    setOps(ops.filter((o) => o.id !== id));
    if (vLig) setVentas(ventas.filter((x) => x.opId !== id));
    setDelOp(null);
    flash(`Registro eliminado${vLig ? " (y su venta vinculada)" : ""}. El plano NO se modifica; usa Deshacer si quieres recuperarlo.`);
  };
  const saveEditOp = () => {
    if (!editOp.fecha || editOp.fecha > hoy()) return flash("Fecha inválida: no puede estar vacía ni ser futura.");
    pushHistorial("Editar operación");
    setOps(ops.map((o) => o.id === editOp.id ? { ...o, fecha: editOp.fecha, nota: editOp.nota } : o));
    setEditOp(null);
  };

  const registrarLote = () => {
    const n = parseInt(op.n), nD = parseInt(op.nDest || op.n);
    if (!n || n <= 0) return flash("Cantidad inválida.");
    if (!op.fecha || op.fecha > hoy()) return flash("Fecha inválida: no puede estar vacía ni ser futura.");
    if (!bx(op.bateaId)) return flash("Selecciona una batea de origen válida.");
    if (["movimiento", "desdoble"].includes(op.tipo) && !bx(op.bateaDestId)) return flash("Selecciona una batea de destino válida.");
    const o = { ...op, id: Date.now(), n, nDest: nD, bateaId: +op.bateaId, bateaDestId: +op.bateaDestId };
    let fases;
    if (o.tipo === "venta") {
      const e = parseFloat(o.veur) || 0;
      o.base = o.vmodo === "sacos"
        ? (parseFloat(o.vsacos) || 0) * 10 * e
        : (parseFloat(o.vkg) || 0) * (1 - (parseFloat(o.vdesct) || 0) / 100) * e;
      if (o.base <= 0) return flash("Faltan datos de la venta (cantidad y €/kg).");
      fases = [{ modo: "quitar", bateaId: o.bateaId, cat: "venta", n }];
    }
    else if (o.tipo === "siembra") fases = [{ modo: "poner", bateaId: o.bateaId, cat: o.cat, n }];
    else if (o.tipo === "ajuste") fases = [{ modo: o.dir, bateaId: o.bateaId, cat: o.cat, n }];
    else if (o.tipo === "movimiento") fases = [
      { modo: "quitar", bateaId: o.bateaId, cat: o.cat, n },
      { modo: "poner", bateaId: o.bateaDestId, cat: o.cat, n },
    ];
    else fases = [ // desdoble: batea origen y destino independientes
      { modo: "quitar", bateaId: o.bateaId, cat: o.cat, n },
      { modo: "poner", bateaId: o.bateaDestId, cat: o.catDest, n: nD },
    ];
    // Quitar más de lo que existe: imposible físicamente → se bloquea (no es sobrecapacidad).
    for (const f of fases) if (f.modo === "quitar" && stock(bx(f.bateaId), f.cat) < f.n)
      return flash(`${bn(f.bateaId)}: solo hay ${stock(bx(f.bateaId), f.cat)} ${CAT[f.cat].label}.`);
    setPend({ op: o, fases, fase: 0, sel: selInicial(fases[0]), snap: clon(bateas), origen: {} });
  };

  const faseActual = pend && pend.fases[pend.fase];
  const toggleCell = (k, modo) => {
    setPend((p) => {
      const s = new Set(p.sel);
      if (modo === "del") s.delete(k);
      else if (!s.has(k) && s.size < p.fases[p.fase].n) s.add(k);
      return { ...p, sel: s };
    });
  };
  // Fecha del lote de una celda (para ordenar por antigüedad); sin lote conocido → muy antigua.
  const fechaCelda = (b, k) => {
    const o = ops.find((x) => x.id === b.lotes?.[k]);
    return o?.fecha || "0000-00-00";
  };
  // Alertas de manejo: cuerdas que llevan más tiempo del razonable sin mover o sin vender.
  const alertasEdad = (b) => {
    const res = [];
    for (const cat of ["colectora", "desdoble", "venta"]) {
      const lim = limMeses[cat];
      let vencidas = 0, sinFecha = 0, antigua = null;
      for (const [k, c] of Object.entries(b.celdas)) {
        if (c !== cat) continue;
        const fecha = fechaCelda(b, k);
        if (fecha === "0000-00-00") { sinFecha++; continue; }
        const meses = (new Date(hoy()) - new Date(fecha)) / (1000 * 60 * 60 * 24 * 30.44);
        if (meses >= lim) { vencidas++; if (!antigua || fecha < antigua) antigua = fecha; }
      }
      if (vencidas || sinFecha) res.push({ cat, vencidas, sinFecha, antigua, lim });
    }
    return res;
  };
  // Preselecciona hasta n celdas para una fase; al retirar, las más antiguas por fecha primero.
  const preSel = (fase, base) => {
    const b = bx(fase.bateaId), s = base ? new Set(base) : new Set();
    const candidatas = [];
    for (let r = 0; r < b.largo; r++)
      for (let c = 0; c < b.ancho; c++) {
        const k = `${r}-${c}`, cat = b.celdas[k];
        if (b.bloq?.[k]) continue;
        if (fase.modo === "poner" ? !cat : cat === fase.cat) candidatas.push(k);
      }
    if (fase.modo !== "poner") // retirar: prioriza las cuerdas más antiguas por fecha
      candidatas.sort((a, b2) => fechaCelda(b, a).localeCompare(fechaCelda(b, b2)));
    for (const k of candidatas) { if (s.size >= fase.n) break; s.add(k); }
    return s;
  };
  // Preselección por defecto solo al retirar (poner se deja al usuario/selección auto manual).
  const selInicial = (fase) => fase.modo === "poner" ? new Set() : preSel(fase);
  const autoSel = () => setPend({ ...pend, sel: preSel(faseActual, pend.sel) });

  const cancelarOp = () => {
    setBateas(pend.snap);
    setPend(null);
    flash("Operación cancelada. Plano restaurado.");
  };

  const confirmarFase = () => {
    const f = faseActual, resto = f.n - pend.sel.size;
    const bs = clon(bateas);
    const b = bs.find((x) => x.id === f.bateaId);
    let origen = pend.origen || {};
    if (f.modo === "poner") {
      pend.sel.forEach((k) => { b.celdas[k] = f.cat; b.lotes[k] = pend.op.id; });
      if (resto > 0) { // sobrecapacidad o sin ubicar: se registra igual + aviso
        b.extra[f.cat] += resto;
        flash(`${b.nombre}: ${resto} cuerdas sin celda libre → registradas sin ubicar (posible sobrecapacidad).`);
      }
    } else {
      // Traza de qué lote(s) salen las cuerdas retiradas, para la ficha de trazabilidad
      const origenFase = {};
      pend.sel.forEach((k) => {
        const loteId = b.lotes[k] ?? "init";
        origenFase[loteId] = (origenFase[loteId] || 0) + 1;
        delete b.celdas[k]; delete b.lotes[k];
      });
      if (resto > 0) {
        const deExtra = Math.min(resto, b.extra[f.cat]);
        b.extra[f.cat] -= deExtra;
        if (resto > deExtra) return flash(`Selecciona ${resto - deExtra} celdas más de ${CAT[f.cat].label}.`);
        if (deExtra > 0) origenFase.extra = (origenFase.extra || 0) + deExtra;
      }
      origen = { ...origen };
      for (const [lid, n] of Object.entries(origenFase)) origen[lid] = (origen[lid] || 0) + n;
    }
    setBateas(bs);
    if (pend.fase + 1 < pend.fases.length) setPend({ ...pend, fase: pend.fase + 1, sel: selInicial(pend.fases[pend.fase + 1]), origen });
    else {
      const o = { ...pend.op, origenLotes: origen };
      let ventaId = null;
      if (o.tipo === "venta") {
        ventaId = Date.now() + 1;
        setVentas((vs) => [{
          id: ventaId, opId: o.id, bateaId: o.bateaId, fecha: o.fecha, modo: o.vmodo, sacos: o.vsacos, kgBrutos: o.vkg,
          desct: o.vdesct, eurkg: o.veur, persona: o.vpersona, comprador: o.vcomprador,
          estado: "pendiente", base: o.base, total: totalVenta(o.base),
        }, ...vs]);
        addCatalogo(setPersonas, o.vpersona);
        addCatalogo(setCompradores, o.vcomprador);
      }
      setHistorial((h) => [...h.slice(-(MAX_UNDO - 1)), { label: `${TIPO_LABEL[o.tipo]} — ${bn(o.bateaId)}`, bateas: pend.snap, ops, ventas }]);
      setOps([o, ...ops]);
      setPend(null);
      setOp({ ...op, n: "", nDest: "", nota: "", vsacos: "", vkg: "", vdesct: "", veur: "" });
      // Aviso de límite lógico superado en las bateas tocadas por la operación
      const tocadas = [...new Set(pend.fases.map((x) => x.bateaId))];
      const avisos = tocadas.flatMap((id) => exceso(bs.find((x) => x.id === id)).map((e) => `${bs.find((x) => x.id === id).nombre}: ${fmtN(e.actual)} ${e.tipo} (máx. ${fmtN(e.lim)}, +${fmtN(e.n)})`));
      if (avisos.length) flash(`Límite superado — ${avisos.join(" · ")}.`);
    }
  };

  // ── Ventas (se crean desde Operaciones → Venta/cosecha) ──
  const [editV, setEditV] = useState(null); // copia editable de la fila
  const [delV, setDelV] = useState(null);
  const saveEditV = () => {
    if (!editV.fecha || editV.fecha > hoy()) return flash("Fecha inválida: no puede estar vacía ni ser futura.");
    const x0 = ventas.find((x) => x.id === editV.id);
    const e = parseFloat(editV.eurkg) || 0;
    const base = x0.modo === "sacos"
      ? (parseFloat(editV.sacos) || 0) * 10 * e
      : (parseFloat(editV.kgBrutos) || 0) * (1 - (parseFloat(editV.desct) || 0) / 100) * e;
    if (base <= 0) return flash("Faltan datos de la venta (cantidad y €/kg).");
    pushHistorial("Editar venta");
    setVentas(ventas.map((x) => x.id === editV.id
      ? { ...x, fecha: editV.fecha, sacos: editV.sacos, kgBrutos: editV.kgBrutos, desct: editV.desct, eurkg: editV.eurkg, persona: editV.persona, comprador: editV.comprador, base, total: totalVenta(base) }
      : x));
    addCatalogo(setPersonas, editV.persona);
    addCatalogo(setCompradores, editV.comprador);
    setEditV(null);
    flash("Venta actualizada.");
  };
  const borrarVenta = (id) => { pushHistorial("Eliminar venta"); setVentas(ventas.filter((x) => x.id !== id)); setDelV(null); };
  const toggleCobro = (id) => { pushHistorial("Cambiar estado de cobro"); setVentas(ventas.map((x) => x.id === id ? { ...x, estado: x.estado === "cobrado" ? "pendiente" : "cobrado", fechaCobro: x.estado === "cobrado" ? null : hoy() } : x)); };
  // ── Filtros ──
  const [fo, setFo] = useState({ desde: "", hasta: "", tipo: "", bateaId: "" });
  const opsF = ops.filter((o) =>
    (!fo.desde || o.fecha >= fo.desde) && (!fo.hasta || o.fecha <= fo.hasta) &&
    (!fo.tipo || o.tipo === fo.tipo) &&
    (!fo.bateaId || o.bateaId === +fo.bateaId || (["movimiento", "desdoble"].includes(o.tipo) && o.bateaDestId === +fo.bateaId)));
  const [fv, setFv] = useState({ desde: "", hasta: "", estado: "", q: "", modo: "", cobroDesde: "", cobroHasta: "" });
  const ventasF = ventas.filter((x) =>
    (!fv.desde || x.fecha >= fv.desde) && (!fv.hasta || x.fecha <= fv.hasta) &&
    (!fv.estado || x.estado === fv.estado) && (!fv.modo || x.modo === fv.modo) &&
    (!fv.cobroDesde || (x.fechaCobro && x.fechaCobro >= fv.cobroDesde)) &&
    (!fv.cobroHasta || (x.fechaCobro && x.fechaCobro <= fv.cobroHasta)) &&
    (!fv.q || `${x.persona} ${x.comprador}`.toLowerCase().includes(fv.q.toLowerCase())));
  const sum = (est) => ventasF.filter((x) => !est || x.estado === est).reduce((s, x) => s + x.total, 0);

  // ── Filtros Resumen / Análisis ──
  const [fr, setFr] = useState({ desde: "", hasta: "", tipo: "", bateas: [] });
  const [fa, setFa] = useState({ desde: "", hasta: "", bateas: [], modo: "" });
  const enB = (lista, ...ids) => lista.length === 0 || ids.some((i) => lista.includes(i));
  const BChips = ({ f, setF }) => (
    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
      {bateas.map((b) => {
        const on = f.bateas.includes(b.id);
        return (
          <button key={b.id} onClick={() => setF({ ...f, bateas: on ? f.bateas.filter((i) => i !== b.id) : [...f.bateas, b.id] })}
            style={{ background: on ? C.rope : "transparent", color: on ? C.ink : C.text, border: `1px solid ${on ? C.rope : C.line}`, borderRadius: 20, padding: "4px 12px", fontSize: 12, cursor: "pointer" }}>
            {b.nombre}
          </button>
        );
      })}
      {f.bateas.length === 0 && <span style={{ color: C.mut, fontSize: 12 }}>todas</span>}
    </div>
  );
  const FechaFiltro = ({ f, setF }) => (
    <>
      <Field label="Desde" w={140}><input style={inp} type="date" value={f.desde} onChange={(e) => setF({ ...f, desde: e.target.value })} /></Field>
      <Field label="Hasta" w={140}><input style={inp} type="date" value={f.hasta} onChange={(e) => setF({ ...f, hasta: e.target.value })} /></Field>
    </>
  );

  const tabs = [["bateas", "Bateas"], ["ops", "Operaciones"], ["ventas", "Ventas"], ["stats", "Resumen"], ["analisis", "Análisis"]];

  if (cargandoDatos) return <Cargando texto="Cargando datos…" />;

  return (
    <div style={{ minHeight: "100vh", background: C.ink, color: C.text, fontFamily: "Inter, sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700&family=Inter:wght@400;500;600&display=swap');
        input:focus,select:focus{outline:2px solid ${C.rope};outline-offset:1px}
        button:hover{filter:brightness(1.12)}
        @media(prefers-reduced-motion:reduce){*{transition:none!important}}`}</style>

      <header style={{ borderBottom: `1px solid ${C.line}`, padding: "20px 24px 0" }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 14, flexWrap: "wrap", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 14, flexWrap: "wrap" }}>
            <h1 style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700, fontSize: 34, letterSpacing: "0.06em", textTransform: "uppercase", margin: 0 }}>Cuaderno de Batea</h1>
            <span style={{ color: C.mut, fontSize: 13 }}>registro por lotes · cuerdas · ventas</span>
          </div>
          <button style={mini()} onClick={() => firebase.auth().signOut()}>Salir ({firebase.auth().currentUser?.email})</button>
        </div>
        <nav style={{ display: "flex", gap: 4, marginTop: 16, flexWrap: "wrap" }}>
          {tabs.map(([k, t]) => (
            <button key={k} onClick={() => setTab(k)} style={{
              background: "transparent", border: "none", cursor: "pointer",
              fontFamily: "'Barlow Condensed',sans-serif", fontSize: 17, fontWeight: 600,
              letterSpacing: "0.08em", textTransform: "uppercase",
              color: tab === k ? C.text : C.mut, padding: "8px 14px",
              borderBottom: `3px solid ${tab === k ? C.rope : "transparent"}`,
            }}>{t}</button>
          ))}
        </nav>
      </header>

      {historial.length > 0 && (
        <div style={{ margin: "12px 24px 0", display: "flex", justifyContent: "flex-end" }}>
          <button style={{ ...btn(false), borderColor: C.warn, color: C.warn }} onClick={deshacerUltimo}>
            ↶ Deshacer «{historial[historial.length - 1].label}» ({historial.length})
          </button>
        </div>
      )}
      {aviso && (
        <div style={{ margin: "12px 24px 0", padding: "10px 14px", background: "#3A2323", border: `1px solid ${C.warn}`, borderRadius: 6, fontSize: 13, color: "#F2C9BE" }}>{aviso}</div>
      )}
      <datalist id="dl-personas">{personas.map((p) => <option key={p} value={p} />)}</datalist>
      <datalist id="dl-compradores">{compradores.map((c) => <option key={c} value={c} />)}</datalist>

      <main style={{ padding: 24, maxWidth: 1100, margin: "0 auto" }}>

        {/* ── BATEAS ── */}
        {tab === "bateas" && flot && (() => {
          const b = bx(flot.bateaId);
          if (!b) return null;
          return (
            <div style={{ background: C.panel, border: `1px solid ${C.sel}`, borderRadius: 10, padding: 18, marginBottom: 18 }}>
              <h2 style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 20, letterSpacing: "0.05em", textTransform: "uppercase", margin: "0 0 4px" }}>
                Flotadores — {b.nombre}
              </h2>
              <p style={{ color: C.mut, fontSize: 13, margin: "0 0 12px" }}>
                Marca las celdas ocupadas por flotadores: quedan anuladas permanentemente y no cuentan como capacidad. Marcadas: {flot.sel.size}.
              </p>
              <Grid b={{ ...b, bloq: {} }} sel={flot.sel} onCell={flotCell} maxW={480}
                elegible={(k, cat) => !cat} />
              <div style={{ display: "flex", gap: 10, marginTop: 14, flexWrap: "wrap" }}>
                <button style={btn(true)} onClick={saveFlot}>Guardar flotadores</button>
                <button style={btn(false)} onClick={() => setFlot(null)}>Cancelar</button>
              </div>
            </div>
          );
        })()}
        {tab === "bateas" && reub && (() => {
          const b = bx(reub.bateaId);
          if (!b) return null;
          return (
            <div style={{ background: C.panel, border: `1px solid ${C.sel}`, borderRadius: 10, padding: 18, marginBottom: 18 }}>
              <h2 style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 20, letterSpacing: "0.05em", textTransform: "uppercase", margin: "0 0 4px" }}>
                Recolocar — {b.nombre}
              </h2>
              <p style={{ color: C.mut, fontSize: 13, margin: "0 0 12px" }}>
                {reub.cat
                  ? `Ubicando ${CAT[reub.cat].label} sin ubicar (quedan ${b.extra[reub.cat]}): pulsa celdas libres.`
                  : reub.sel.size
                    ? `${reub.sel.size} cuerdas en el grupo: cada pulsación (o arrastre) sobre celdas libres mueve una, en orden de selección. Lote y nota se conservan.`
                    : "Selecciona cuerdas (clic o arrastre) para formar el grupo; luego pulsa/arrastra sobre celdas libres para moverlas."}
                {" · "}Celdas libres: <b>{fmtN(libres(b))}</b>
              </p>
              {extraTot(b) > 0 && !reub.sel.size && (
                <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
                  {CATS.filter((c) => b.extra[c] > 0).map((c) => (
                    <button key={c} style={{ ...btn(reub.cat === c), borderColor: CAT[c].color }}
                      onClick={() => setReub({ ...reub, cat: reub.cat === c ? null : c, sel: new Set() })}>
                      Ubicar {CAT[c].label} ({b.extra[c]})
                    </button>
                  ))}
                </div>
              )}
              <Grid b={b} maxW={480} info={loteInfo(b)}
                sel={reub.sel}
                onCell={reubCell}
                elegible={(k, cat, blq) => !blq && (reub.cat ? !cat : true)} />
              <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
                {reub.sel.size > 0 && <button style={btn(false)} onClick={() => setReub({ ...reub, sel: new Set() })}>Vaciar grupo</button>}
                <button style={btn(true)} onClick={() => setReub(null)}>Terminar</button>
              </div>
            </div>
          );
        })()}
        {tab === "bateas" && (
          <>
            <div style={{ display: "flex", gap: 18, fontSize: 12, color: C.mut, marginBottom: 18, flexWrap: "wrap" }}>
              {CATS.map((c) => (
                <span key={c} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ width: 10, height: 10, borderRadius: 2, background: CAT[c].color, display: "inline-block" }} />{CAT[c].label}
                </span>
              ))}
              <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ width: 10, height: 10, borderRadius: 2, background: C.line, display: "inline-block" }} />Libre
              </span>
              <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ width: 10, height: 10, borderRadius: 2, background: "#050E14", border: `1px solid ${C.line}`, display: "inline-block" }} />Flotador (anulada)
              </span>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(min(100%,460px),1fr))", gap: 16 }}>
              {bateas.map((b) => {
                const oc = ocup(b), ext = extraTot(b), exc = exceso(b), sobre = exc.length > 0;
                const alEdad = alertasEdad(b);
                const enEdicion = edit?.id === b.id;
                return (
                  <div key={b.id} style={{ background: C.panel, border: `1px solid ${sobre ? C.warn : C.line}`, borderRadius: 10, padding: 18 }}>
                    {enEdicion ? (
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
                        <Field label="Nombre" w={110}><input style={inp} value={edit.nombre} onChange={(e) => setEdit({ ...edit, nombre: e.target.value })} /></Field>
                        <Field label="Ancho" w={70}><input style={inp} type="number" value={edit.ancho} onChange={(e) => setEdit({ ...edit, ancho: e.target.value })} /></Field>
                        <Field label="Largo" w={70}><input style={inp} type="number" value={edit.largo} onChange={(e) => setEdit({ ...edit, largo: e.target.value })} /></Field>
                        <div style={{ display: "flex", gap: 6, alignItems: "flex-end" }}>
                          <button style={btn(true)} onClick={saveEdit}>Guardar</button>
                          <button style={btn(false)} onClick={() => { setEdit(null); abrirFlot(b); }}>Flotadores</button>
                          {delBatea === b.id ? (
                            <>
                              <button style={{ ...btn(true), background: C.warn, borderColor: C.warn }} onClick={() => borrarBatea(b.id)}>¿Seguro? Sí, borrar</button>
                              <button style={btn(false)} onClick={() => setDelBatea(null)}>No</button>
                            </>
                          ) : (
                            <button style={{ ...btn(false), borderColor: C.warn, color: C.warn }} onClick={() => setDelBatea(b.id)}>Borrar</button>
                          )}
                          <button style={btn(false)} onClick={() => setEdit(null)}>Cancelar</button>
                        </div>
                      </div>
                    ) : (
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
                        <h2 style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 22, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase", margin: 0 }}>{b.nombre}</h2>
                        <span style={{ fontSize: 13, color: sobre ? C.warn : C.mut, whiteSpace: "nowrap" }}>
                          {fmtN(oc)} / {fmtN(cap(b))} · {b.ancho}×{b.largo}
                          <button onClick={() => setEdit({ id: b.id, nombre: b.nombre, ancho: b.ancho, largo: b.largo })}
                            style={{ ...btn(false), padding: "2px 9px", marginLeft: 8, fontSize: 12 }}>Editar</button>
                          <button onClick={() => { pushHistorial(`Recolocar — ${b.nombre}`); setReub({ bateaId: b.id, sel: new Set(), cat: null }); }}
                            style={{ ...btn(false), padding: "2px 9px", marginLeft: 6, fontSize: 12 }}>Recolocar</button>
                        </span>
                      </div>
                    )}
                    <div style={{ margin: "14px 0" }}><Grid b={b} maxW={640} info={loteInfo(b)} /></div>
                    <div style={{ display: "flex", gap: 14, fontSize: 13, flexWrap: "wrap" }}>
                      {CATS.map((c) => (
                        <span key={c}><b style={{ color: CAT[c].color }}>{fmtN(stock(b, c))}</b> <span style={{ color: C.mut }}>{c === "desdoble" ? "mexilla" : c}</span></span>
                      ))}
                    </div>
                    {(sobre || ext > 0 || alEdad.length > 0) && (
                      <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 4 }}>
                        {exc.map((e) => (
                          <Warn key={e.tipo}>Límite superado en {e.tipo}: {fmtN(e.actual)} cuerdas (máx. {fmtN(e.lim)}) → {fmtN(e.n)} por encima.</Warn>
                        ))}
                        {ext > 0 && <Warn>{fmtN(ext)} cuerdas sin ubicar en el plano.</Warn>}
                        {alEdad.map((a) => (
                          <Warn key={a.cat}>{fmtN(a.vencidas)} {CAT[a.cat].label} con más de {a.lim} meses{a.antigua ? ` (desde ${a.antigua})` : ""} — {MENSAJE_ALERTA[a.cat]}.{a.sinFecha ? ` · ${fmtN(a.sinFecha)} más sin fecha conocida.` : ""}</Warn>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}

              <div style={{ background: C.panel2, border: `1px dashed ${C.line}`, borderRadius: 10, padding: 18, display: "flex", flexDirection: "column", gap: 10, justifyContent: "center" }}>
                <Field label="Nueva batea"><input style={inp} placeholder="Nombre" value={nb.nombre} onChange={(e) => setNb({ ...nb, nombre: e.target.value })} /></Field>
                <div style={{ display: "flex", gap: 8 }}>
                  <Field label="Ancho (cuerdas)"><input style={inp} type="number" placeholder="20" value={nb.ancho} onChange={(e) => setNb({ ...nb, ancho: e.target.value })} /></Field>
                  <Field label="Largo (cuerdas)"><input style={inp} type="number" placeholder="25" value={nb.largo} onChange={(e) => setNb({ ...nb, largo: e.target.value })} /></Field>
                </div>
                <button style={btn(true)} onClick={addBatea}>Añadir batea</button>
              </div>
            </div>
          </>
        )}

        {/* ── OPERACIONES ── */}
        {tab === "ops" && !pend && (
          <>
            {verLote && (() => {
              const opL = ops.find((x) => x.id === verLote);
              if (!opL) return null;
              const labelLote = (lid) => {
                if (lid === "init") return "cuerdas iniciales (sin lote registrado)";
                if (lid === "extra") return "cuerdas que ya estaban sin ubicar";
                const o2 = ops.find((x) => x.id === +lid);
                return o2 ? `${TIPO_LABEL[o2.tipo]} · ${o2.fecha} · ${bn(o2.bateaId)}` : `lote #${lid}`;
              };
              const origen = Object.entries(opL.origenLotes || {});
              const destino = ops.filter((x) => x.origenLotes && x.origenLotes[opL.id]).map((x) => ({ op: x, n: x.origenLotes[opL.id] }));
              const enPlano = bateas.map((b) => {
                let n = 0, cat = null;
                for (const [k, c] of Object.entries(b.celdas)) if (b.lotes?.[k] === opL.id) { n++; cat = c; }
                return { b, n, cat };
              }).filter((r) => r.n > 0);
              const venta = ventas.find((v) => v.opId === opL.id);
              return (
                <div style={{ background: C.panel, border: `1px solid ${C.sel}`, borderRadius: 10, padding: 18, marginBottom: 18 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
                    <h2 style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 20, letterSpacing: "0.05em", textTransform: "uppercase", margin: "0 0 4px" }}>
                      Ficha de lote — {TIPO_LABEL[opL.tipo]} · {opL.fecha} · {bn(opL.bateaId)}
                    </h2>
                    <button style={mini()} onClick={() => setVerLote(null)}>Cerrar</button>
                  </div>
                  <p style={{ color: C.mut, fontSize: 13, margin: "0 0 12px" }}>{fmtN(opL.n)} cuerdas{opL.nota ? ` · ${opL.nota}` : ""}</p>
                  <h3 style={{ ...h3, margin: "14px 0 6px" }}>Origen</h3>
                  {origen.length ? (
                    <ul style={{ margin: "0 0 10px", paddingLeft: 18, fontSize: 13 }}>
                      {origen.map(([lid, n]) => <li key={lid}>{fmtN(n)} cuerdas de {labelLote(lid)}</li>)}
                    </ul>
                  ) : <p style={{ fontSize: 13, color: C.mut }}>Cuerdas nuevas, sin lote de origen registrado.</p>}
                  <h3 style={{ ...h3, margin: "14px 0 6px" }}>Usado en</h3>
                  {destino.length ? (
                    <ul style={{ margin: "0 0 10px", paddingLeft: 18, fontSize: 13 }}>
                      {destino.map(({ op: x, n }) => (
                        <li key={x.id}>{fmtN(n)} cuerdas → {TIPO_LABEL[x.tipo]} · {x.fecha} · {bn(x.bateaId)}{" "}
                          <button style={mini()} onClick={() => setVerLote(x.id)}>ver</button>
                        </li>
                      ))}
                    </ul>
                  ) : <p style={{ fontSize: 13, color: C.mut }}>Todavía no se ha usado en ninguna operación posterior.</p>}
                  <h3 style={{ ...h3, margin: "14px 0 6px" }}>Actualmente en el plano</h3>
                  {enPlano.length ? (
                    <ul style={{ margin: "0 0 10px", paddingLeft: 18, fontSize: 13 }}>
                      {enPlano.map(({ b, n, cat }) => <li key={b.id}>{fmtN(n)} cuerdas en {b.nombre} ({CAT[cat].label})</li>)}
                    </ul>
                  ) : <p style={{ fontSize: 13, color: C.mut }}>Ninguna cuerda de este lote sigue en el plano.</p>}
                  {venta && (
                    <>
                      <h3 style={{ ...h3, margin: "14px 0 6px" }}>Venta asociada</h3>
                      <p style={{ fontSize: 13 }}>{fmtEUR(venta.total)} · {venta.estado}{venta.comprador ? ` · ${venta.comprador}` : ""}</p>
                    </>
                  )}
                </div>
              );
            })()}
            <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 10, padding: 18 }}>
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                <Field label="Tipo">
                  <select style={inp} value={op.tipo} onChange={(e) => setOp({ ...op, tipo: e.target.value })}>
                    <option value="siembra">Siembra</option>
                    <option value="desdoble">Desdoble</option>
                    <option value="venta">Venta / cosecha</option>
                    <option value="movimiento">Movimiento</option>
                    <option value="ajuste">Ajuste de stock</option>
                  </select>
                </Field>
                {op.tipo === "ajuste" && (
                  <Field label="Ajuste">
                    <select style={inp} value={op.dir} onChange={(e) => setOp({ ...op, dir: e.target.value })}>
                      <option value="quitar">Quitar (pérdida / error)</option>
                      <option value="poner">Añadir (error de registro)</option>
                    </select>
                  </Field>
                )}
                <Field label="Fecha"><input style={inp} type="date" max={hoy()} value={op.fecha} onChange={(e) => setOp({ ...op, fecha: e.target.value })} /></Field>
                <Field label={["movimiento", "desdoble"].includes(op.tipo) ? "Batea origen" : "Batea"}>
                  <select style={inp} value={op.bateaId} onChange={(e) => setOp({ ...op, bateaId: e.target.value })}>
                    {bateas.map((b) => <option key={b.id} value={b.id}>{b.nombre}</option>)}
                  </select>
                </Field>
                {["movimiento", "desdoble"].includes(op.tipo) && (
                  <Field label="Batea destino">
                    <select style={inp} value={op.bateaDestId} onChange={(e) => setOp({ ...op, bateaDestId: e.target.value })}>
                      {bateas.map((b) => <option key={b.id} value={b.id}>{b.nombre}</option>)}
                    </select>
                  </Field>
                )}
                {op.tipo !== "venta" && (
                  <Field label={op.tipo === "desdoble" ? "Cuerda origen" : "Tipo de cuerda"}>
                    <select style={inp} value={op.cat} onChange={(e) => setOp({ ...op, cat: e.target.value })}>
                      {CATS.map((c) => <option key={c} value={c}>{CAT[c].label}</option>)}
                    </select>
                  </Field>
                )}
                <Field label={op.tipo === "desdoble" ? "Cuerdas origen" : "Nº cuerdas"}>
                  <input style={inp} type="number" min="1" placeholder="50" value={op.n} onChange={(e) => setOp({ ...op, n: e.target.value })} />
                </Field>
                {op.tipo === "desdoble" && (
                  <>
                    <Field label="Cuerda resultado">
                      <select style={inp} value={op.catDest} onChange={(e) => setOp({ ...op, catDest: e.target.value })}>
                        {CATS.map((c) => <option key={c} value={c}>{CAT[c].label}</option>)}
                      </select>
                    </Field>
                    <Field label="Cuerdas resultantes">
                      <input style={inp} type="number" min="1" placeholder="100" value={op.nDest} onChange={(e) => setOp({ ...op, nDest: e.target.value })} />
                    </Field>
                  </>
                )}
                {op.tipo === "venta" && (
                  <>
                    <Field label="Modo venta">
                      <select style={inp} value={op.vmodo} onChange={(e) => setOp({ ...op, vmodo: e.target.value })}>
                        <option value="sacos">Sacos (10 kg)</option>
                        <option value="granel">Granel (kg brutos)</option>
                      </select>
                    </Field>
                    {op.vmodo === "sacos" ? (
                      <Field label="Sacos"><input style={inp} type="number" placeholder="458" value={op.vsacos} onChange={(e) => setOp({ ...op, vsacos: e.target.value })} /></Field>
                    ) : (
                      <>
                        <Field label="Kg brutos"><input style={inp} type="number" placeholder="14900" value={op.vkg} onChange={(e) => setOp({ ...op, vkg: e.target.value })} /></Field>
                        <Field label="Descuento %"><input style={inp} type="number" placeholder="48" value={op.vdesct} onChange={(e) => setOp({ ...op, vdesct: e.target.value })} /></Field>
                      </>
                    )}
                    <Field label="€ / kg"><input style={inp} type="number" step="0.001" placeholder="0,76" value={op.veur} onChange={(e) => setOp({ ...op, veur: e.target.value })} /></Field>
                    <Field label="Persona"><input style={inp} list="dl-personas" placeholder="Román" value={op.vpersona} onChange={(e) => setOp({ ...op, vpersona: e.target.value })} /></Field>
                    <Field label="Comprador"><input style={inp} list="dl-compradores" placeholder="Udana" value={op.vcomprador} onChange={(e) => setOp({ ...op, vcomprador: e.target.value })} /></Field>
                  </>
                )}
                <Field label="Nota"><input style={inp} placeholder="Opcional" value={op.nota} onChange={(e) => setOp({ ...op, nota: e.target.value })} /></Field>
              </div>
              <div style={{ marginTop: 14, display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
                <button style={btn(true)} onClick={registrarLote}>Registrar lote</button>
                {op.tipo === "venta" && (() => {
                  const e = parseFloat(op.veur) || 0;
                  const base = op.vmodo === "sacos" ? (parseFloat(op.vsacos) || 0) * 10 * e
                    : (parseFloat(op.vkg) || 0) * (1 - (parseFloat(op.vdesct) || 0) / 100) * e;
                  return <span style={{ fontSize: 13, color: C.mut }}>Base {fmtEUR(base)} − {DESCT}% + IVA {IVA}% = <b style={{ color: C.foam, fontSize: 15 }}>{fmtEUR(totalVenta(base))}</b> · se anota en Ventas al confirmar la retirada</span>;
                })()}
              </div>
            </div>

            <h3 style={h3}>Historial</h3>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 12 }}>
              <Field label="Desde" w={140}><input style={inp} type="date" value={fo.desde} onChange={(e) => setFo({ ...fo, desde: e.target.value })} /></Field>
              <Field label="Hasta" w={140}><input style={inp} type="date" value={fo.hasta} onChange={(e) => setFo({ ...fo, hasta: e.target.value })} /></Field>
              <Field label="Tipo" w={140}>
                <select style={inp} value={fo.tipo} onChange={(e) => setFo({ ...fo, tipo: e.target.value })}>
                  <option value="">Todos</option><option value="siembra">Siembra</option><option value="desdoble">Desdoble</option>
                  <option value="venta">Venta / cosecha</option><option value="movimiento">Movimiento</option><option value="ajuste">Ajuste</option>
                </select>
              </Field>
              <Field label="Batea" w={140}>
                <select style={inp} value={fo.bateaId} onChange={(e) => setFo({ ...fo, bateaId: e.target.value })}>
                  <option value="">Todas</option>
                  {bateas.map((b) => <option key={b.id} value={b.id}>{b.nombre}</option>)}
                </select>
              </Field>
              <div style={{ display: "flex", alignItems: "flex-end" }}>
                <button style={btn(false)} onClick={() => setFo({ desde: "", hasta: "", tipo: "", bateaId: "" })}>Limpiar</button>
              </div>
            </div>
            {opsF.length === 0 ? (
              <p style={{ color: C.mut, fontSize: 14 }}>Sin operaciones. Registra el primer lote arriba.</p>
            ) : (
              <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}><table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead>
                  <tr style={{ color: C.mut, textAlign: "left" }}>
                    {["Fecha", "Tipo", "Batea", "Detalle", "Nota", ""].map((h, i) => <th key={i} style={{ padding: "6px 8px", borderBottom: `1px solid ${C.line}` }}>{h}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {opsF.map((o) => {
                    const det = o.tipo === "ajuste"
                      ? `${o.dir === "poner" ? "+" : "−"}${o.n} ${CAT[o.cat].label}`
                      : o.tipo === "desdoble"
                      ? `${o.n} ${CAT[o.cat].label} → ${o.nDest} ${CAT[o.catDest].label} en ${bn(o.bateaDestId)}`
                      : o.tipo === "movimiento"
                        ? `${o.n} ${CAT[o.cat].label} → ${bn(o.bateaDestId)}`
                        : `${o.n} ${o.tipo === "venta" ? "cuerdas de venta" : CAT[o.cat].label}`;
                    return (
                      <tr key={o.id} style={{ borderBottom: `1px solid ${C.line}` }}>
                        <td style={{ padding: "7px 8px", whiteSpace: "nowrap" }}>
                          {editOp?.id === o.id
                            ? <input style={{ ...inp, padding: "4px 6px", width: 130 }} type="date" max={hoy()} value={editOp.fecha} onChange={(e) => setEditOp({ ...editOp, fecha: e.target.value })} />
                            : o.fecha}
                        </td>
                        <td style={{ padding: "7px 8px", textTransform: "capitalize" }}>{o.tipo}</td>
                        <td style={{ padding: "7px 8px" }}>{bn(o.bateaId)}</td>
                        <td style={{ padding: "7px 8px" }}>{det}</td>
                        <td style={{ padding: "7px 8px", color: C.mut }}>
                          {editOp?.id === o.id
                            ? <input style={{ ...inp, padding: "4px 6px" }} value={editOp.nota} onChange={(e) => setEditOp({ ...editOp, nota: e.target.value })} />
                            : o.nota}
                        </td>
                        <td style={{ padding: "7px 8px", whiteSpace: "nowrap" }}>
                          {editOp?.id === o.id ? (
                            <>
                              <button style={mini(C.foam)} onClick={saveEditOp}>Guardar</button>{" "}
                              <button style={mini()} onClick={() => setEditOp(null)}>×</button>
                            </>
                          ) : delOp === o.id ? (
                            <>
                              <button style={mini(C.warn)} onClick={() => borrarOp(o.id)}>¿Seguro?</button>{" "}
                              <button style={mini()} onClick={() => setDelOp(null)}>No</button>
                            </>
                          ) : (
                            <>
                              <button style={mini()} onClick={() => setVerLote(o.id)}>👁</button>{" "}
                              <button style={mini()} onClick={() => setEditOp({ id: o.id, fecha: o.fecha, nota: o.nota || "" })}>✎</button>{" "}
                              <button style={mini(C.warn)} onClick={() => setDelOp(o.id)}>🗑</button>
                            </>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table></div>
            )}
          </>
        )}

        {/* ── COLOCACIÓN EN PLANO ── */}
        {tab === "ops" && pend && (() => {
          const f = faseActual, b = bx(f.bateaId);
          const falta = f.n - pend.sel.size;
          return (
            <div style={{ background: C.panel, border: `1px solid ${C.sel}`, borderRadius: 10, padding: 18 }}>
              <h2 style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 20, letterSpacing: "0.05em", textTransform: "uppercase", margin: "0 0 4px" }}>
                {f.modo === "poner" ? "Colocar" : "Retirar"} {f.n} × {CAT[f.cat].label} — {b.nombre}
              </h2>
              <p style={{ color: C.mut, fontSize: 13, margin: "0 0 12px" }}>
                Fase {pend.fase + 1} de {pend.fases.length} · marcadas {pend.sel.size} / {f.n}
                {f.modo === "poner" && <> · celdas libres en {b.nombre}: <b>{fmtN(libres(b))}</b></>}
                {f.modo === "poner" && falta > 0 && <> · las no ubicadas se registran igualmente con aviso</>}
              </p>
              {f.modo === "poner" && libres(b) < falta && (
                <div style={{ marginBottom: 10 }}>
                  <Warn>Solo quedan {fmtN(libres(b))} celdas libres para {falta} pendientes: {falta - libres(b)} se registrarán sin ubicar (sobrecapacidad) si confirmas así.</Warn>
                </div>
              )}
              <Grid b={b} sel={pend.sel} onCell={toggleCell} maxW={480}
                elegible={(k, cat, blq) => !blq && (pend.sel.has(k) || (f.modo === "poner" ? !cat : cat === f.cat))} />
              <div style={{ display: "flex", gap: 10, marginTop: 14, flexWrap: "wrap" }}>
                <button style={btn(true)} onClick={confirmarFase}>
                  Confirmar {f.modo === "poner" ? "colocación" : "retirada"}
                </button>
                <button style={btn(false)} onClick={autoSel}>Selección automática</button>
                <button style={btn(false)} onClick={() => setPend({ ...pend, sel: new Set() })}>Limpiar</button>
                <button style={{ ...btn(false), borderColor: C.warn, color: C.warn }} onClick={cancelarOp}>Cancelar operación</button>
              </div>
            </div>
          );
        })()}

        {/* ── VENTAS ── */}
        {tab === "ventas" && (
          <>
            <div style={{ display: "flex", gap: 14, marginBottom: 18, flexWrap: "wrap" }}>
              {[["Total", sum()], ["Cobrado", sum("cobrado")], ["Pendiente", sum("pendiente")]].map(([t, n]) => (
                <div key={t} style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 10, padding: "12px 18px", minWidth: 150 }}>
                  <div style={lbl}>{t}</div>
                  <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 26, fontWeight: 700 }}>{fmtEUR(n)}</div>
                </div>
              ))}
            </div>

            <p style={{ color: C.mut, fontSize: 13, margin: "0 0 4px" }}>
              Las ventas se anotan automáticamente al registrar una operación de <b>Venta / cosecha</b> en Operaciones.
            </p>
            <button style={{ ...mini(), margin: "6px 0" }} onClick={() => setCatAbierto((v) => !v)}>
              {catAbierto ? "Ocultar" : "Gestionar"} catálogo de personas / compradores
            </button>
            {catAbierto && (
              <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 10, padding: 14, margin: "10px 0", display: "flex", gap: 24, flexWrap: "wrap" }}>
                <CatalogoField label="Personas" items={personas} onAdd={(v) => addCatalogo(setPersonas, v)} onDel={(v) => delCatalogo(setPersonas, v)} />
                <CatalogoField label="Compradores" items={compradores} onAdd={(v) => addCatalogo(setCompradores, v)} onDel={(v) => delCatalogo(setCompradores, v)} />
              </div>
            )}

            <h3 style={h3}>Registro</h3>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 12 }}>
              <Field label="Desde" w={140}><input style={inp} type="date" value={fv.desde} onChange={(e) => setFv({ ...fv, desde: e.target.value })} /></Field>
              <Field label="Hasta" w={140}><input style={inp} type="date" value={fv.hasta} onChange={(e) => setFv({ ...fv, hasta: e.target.value })} /></Field>
              <Field label="Estado" w={130}>
                <select style={inp} value={fv.estado} onChange={(e) => setFv({ ...fv, estado: e.target.value })}>
                  <option value="">Todos</option><option value="cobrado">Cobrado</option><option value="pendiente">Pendiente</option>
                </select>
              </Field>
              <Field label="Tipo" w={130}>
                <select style={inp} value={fv.modo} onChange={(e) => setFv({ ...fv, modo: e.target.value })}>
                  <option value="">Todos</option><option value="sacos">Bolsas</option><option value="granel">Granel</option>
                </select>
              </Field>
              <Field label="Persona / comprador" w={170}><input style={inp} placeholder="Buscar…" value={fv.q} onChange={(e) => setFv({ ...fv, q: e.target.value })} /></Field>
              <Field label="Cobrado desde" w={140}><input style={inp} type="date" value={fv.cobroDesde} onChange={(e) => setFv({ ...fv, cobroDesde: e.target.value })} /></Field>
              <Field label="Cobrado hasta" w={140}><input style={inp} type="date" value={fv.cobroHasta} onChange={(e) => setFv({ ...fv, cobroHasta: e.target.value })} /></Field>
              <div style={{ display: "flex", alignItems: "flex-end", gap: 8 }}>
                <button style={btn(false)} onClick={() => setFv({ desde: "", hasta: "", estado: "", q: "", modo: "", cobroDesde: "", cobroHasta: "" })}>Limpiar</button>
                <button style={btn(false)} onClick={() => descargarCSV("ventas.csv",
                  ["Fecha", "Modo", "Sacos", "Kg brutos", "Descuento %", "€/kg", "Total", "Persona", "Comprador", "Estado", "Fecha cobro"],
                  ventasF.map((x) => [x.fecha, x.modo, x.sacos || "", x.kgBrutos || "", x.desct || "", x.eurkg, x.total.toFixed(2), x.persona, x.comprador, x.estado, x.fechaCobro || ""]))}>
                  Exportar CSV
                </button>
              </div>
            </div>
            {ventasF.length === 0 ? (
              <p style={{ color: C.mut, fontSize: 14 }}>Sin ventas registradas.</p>
            ) : (
              <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}><table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead>
                  <tr style={{ color: C.mut, textAlign: "left" }}>
                    {["Fecha", "Detalle", "€/kg", "Total", "Persona", "Comprador", "Estado", ""].map((h, i) => <th key={i} style={{ padding: "6px 8px", borderBottom: `1px solid ${C.line}` }}>{h}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {ventasF.map((x) => {
                    const ed = editV?.id === x.id;
                    const cIn = { ...inp, padding: "4px 6px" };
                    return (
                    <tr key={x.id} style={{ borderBottom: `1px solid ${C.line}` }}>
                      <td style={{ padding: "7px 8px", whiteSpace: "nowrap" }}>
                        {ed ? <input style={{ ...cIn, width: 130 }} type="date" max={hoy()} value={editV.fecha} onChange={(e) => setEditV({ ...editV, fecha: e.target.value })} /> : x.fecha}
                      </td>
                      <td style={{ padding: "7px 8px" }}>
                        {ed
                          ? (x.modo === "sacos"
                            ? <span style={{ display: "inline-flex", gap: 6, alignItems: "center" }}>
                                <input style={{ ...cIn, width: 80 }} type="number" value={editV.sacos} onChange={(e) => setEditV({ ...editV, sacos: e.target.value })} /> sacos
                              </span>
                            : <span style={{ display: "inline-flex", gap: 6, alignItems: "center" }}>
                                <input style={{ ...cIn, width: 90 }} type="number" value={editV.kgBrutos} onChange={(e) => setEditV({ ...editV, kgBrutos: e.target.value })} /> kg −
                                <input style={{ ...cIn, width: 60 }} type="number" value={editV.desct} onChange={(e) => setEditV({ ...editV, desct: e.target.value })} /> %
                              </span>)
                          : (x.modo === "sacos" ? `${fmtN(+x.sacos)} sacos` : `${fmtN(+x.kgBrutos)} kg (−${x.desct}%)`)}
                      </td>
                      <td style={{ padding: "7px 8px" }}>
                        {ed ? <input style={{ ...cIn, width: 75 }} type="number" step="0.001" value={editV.eurkg} onChange={(e) => setEditV({ ...editV, eurkg: e.target.value })} /> : x.eurkg}
                      </td>
                      <td style={{ padding: "7px 8px", fontWeight: 600 }}>{fmtEUR(x.total)}</td>
                      <td style={{ padding: "7px 8px" }}>
                        {ed ? <input style={{ ...cIn, width: 90 }} list="dl-personas" value={editV.persona} onChange={(e) => setEditV({ ...editV, persona: e.target.value })} /> : x.persona}
                      </td>
                      <td style={{ padding: "7px 8px" }}>
                        {ed ? <input style={{ ...cIn, width: 90 }} list="dl-compradores" value={editV.comprador} onChange={(e) => setEditV({ ...editV, comprador: e.target.value })} /> : x.comprador}
                      </td>
                      <td style={{ padding: "7px 8px" }}>
                        <button onClick={() => toggleCobro(x.id)} style={{
                          background: "transparent", cursor: "pointer", borderRadius: 20,
                          border: `1px solid ${x.estado === "cobrado" ? C.foam : C.warn}`,
                          color: x.estado === "cobrado" ? C.foam : C.warn,
                          padding: "3px 12px", fontSize: 12,
                        }}>{x.estado}</button>
                        {x.estado === "cobrado" && x.fechaCobro && <div style={{ color: C.mut, fontSize: 11, marginTop: 3 }}>{x.fechaCobro}</div>}
                      </td>
                      <td style={{ padding: "7px 8px", whiteSpace: "nowrap" }}>
                        {ed ? (
                          <>
                            <button style={mini(C.foam)} onClick={saveEditV}>Guardar</button>{" "}
                            <button style={mini()} onClick={() => setEditV(null)}>×</button>
                          </>
                        ) : delV === x.id ? (
                          <>
                            <button style={mini(C.warn)} onClick={() => borrarVenta(x.id)}>¿Seguro?</button>{" "}
                            <button style={mini()} onClick={() => setDelV(null)}>No</button>
                          </>
                        ) : (
                          <>
                            <button style={mini()} onClick={() => { setTab("ops"); setVerLote(x.opId); }}>👁</button>{" "}
                            <button style={mini()} onClick={() => setEditV({ id: x.id, fecha: x.fecha, sacos: x.sacos || "", kgBrutos: x.kgBrutos || "", desct: x.desct || "", eurkg: x.eurkg || "", persona: x.persona || "", comprador: x.comprador || "" })}>✎</button>{" "}
                            <button style={mini(C.warn)} onClick={() => setDelV(x.id)}>🗑</button>
                          </>
                        )}
                      </td>
                    </tr>);
                  })}
                </tbody>
              </table></div>
            )}
          </>
        )}

        {/* ── ANÁLISIS ── */}
        {tab === "stats" && (() => {
          const opsR = ops.filter((o) =>
            (!fr.desde || o.fecha >= fr.desde) && (!fr.hasta || o.fecha <= fr.hasta) &&
            (!fr.tipo || o.tipo === fr.tipo) && enB(fr.bateas, o.bateaId, o.bateaDestId));
          const ventasR = ventas.filter((x) =>
            (!fr.desde || x.fecha >= fr.desde) && (!fr.hasta || x.fecha <= fr.hasta) && enB(fr.bateas, x.bateaId));
          const stockTot = (c) => bateas.reduce((s, b) => s + stock(b, c), 0);
          const capTot = bateas.length * capLog();
          const ocupTot = bateas.reduce((s, b) => s + ocup(b), 0);
          const kpis = [
            ["Cuerdas de venta listas", fmtN(stockTot("venta")), C.foam],
            ["Mexilla en curso", fmtN(stockTot("desdoble")), C.pink],
            ["Colectoras", fmtN(stockTot("colectora")), C.rope],
            ["Ocupación total", `${fmtN(ocupTot)} / ${fmtN(capTot)} (${capTot ? Math.round((ocupTot / capTot) * 100) : 0}%)`, ocupTot > capTot ? C.warn : C.text],
            ["Facturado (filtro)", fmtEUR(ventasR.reduce((s, x) => s + x.total, 0)), C.text],
            ["Pendiente de cobro (filtro)", fmtEUR(ventasR.filter((x) => x.estado === "pendiente").reduce((s, x) => s + x.total, 0)), C.warn],
          ];
          return (
            <>
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "flex-end", marginBottom: 16, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 10, padding: 14 }}>
                <FechaFiltro f={fr} setF={setFr} />
                <Field label="Operación" w={150}>
                  <select style={inp} value={fr.tipo} onChange={(e) => setFr({ ...fr, tipo: e.target.value })}>
                    <option value="">Todas</option><option value="siembra">Siembra</option><option value="desdoble">Desdoble</option>
                    <option value="venta">Venta / cosecha</option><option value="movimiento">Movimiento</option><option value="ajuste">Ajuste</option>
                  </select>
                </Field>
                <Field label="Bateas" w={220}><BChips f={fr} setF={setFr} /></Field>
                <button style={btn(false)} onClick={() => setFr({ desde: "", hasta: "", tipo: "", bateas: [] })}>Limpiar</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(min(100%,200px),1fr))", gap: 14 }}>
                {kpis.map(([t, v, col]) => (
                  <div key={t} style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 10, padding: "12px 16px" }}>
                    <div style={lbl}>{t}</div>
                    <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 24, fontWeight: 700, color: col }}>{v}</div>
                  </div>
                ))}
              </div>
              <h3 style={h3}>Stock por batea</h3>
              <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}><table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead>
                  <tr style={{ color: C.mut, textAlign: "left" }}>
                    {["Batea", "Colectora", "Mexilla", "Venta", "Ocupación", "Capacidad"].map((h) => <th key={h} style={{ padding: "6px 8px", borderBottom: `1px solid ${C.line}` }}>{h}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {bateas.map((b) => (
                    <tr key={b.id} style={{ borderBottom: `1px solid ${C.line}` }}>
                      <td style={{ padding: "7px 8px" }}>{b.nombre}</td>
                      <td style={{ padding: "7px 8px", color: C.rope }}>{fmtN(stock(b, "colectora"))}</td>
                      <td style={{ padding: "7px 8px", color: C.pink }}>{fmtN(stock(b, "desdoble"))}</td>
                      <td style={{ padding: "7px 8px", color: C.foam }}>{fmtN(stock(b, "venta"))}</td>
                      <td style={{ padding: "7px 8px", color: exceso(b).length ? C.warn : C.text }}>{fmtN(ocup(b))}</td>
                      <td style={{ padding: "7px 8px", color: C.mut }}>{fmtN(capLog())}</td>
                    </tr>
                  ))}
                </tbody>
              </table></div>
              <h3 style={h3}>Alertas de manejo (antigüedad)</h3>
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "flex-end", marginBottom: 12 }}>
                <Field label="Aviso colectora (meses)" w={160}>
                  <input style={inp} type="number" min="1" value={limMeses.colectora}
                    onChange={(e) => setLimMeses({ ...limMeses, colectora: parseInt(e.target.value) || 1 })} />
                </Field>
                <Field label="Aviso mexilla (meses)" w={160}>
                  <input style={inp} type="number" min="1" value={limMeses.desdoble}
                    onChange={(e) => setLimMeses({ ...limMeses, desdoble: parseInt(e.target.value) || 1 })} />
                </Field>
                <Field label="Aviso venta sin vender (meses)" w={190}>
                  <input style={inp} type="number" min="1" value={limMeses.venta}
                    onChange={(e) => setLimMeses({ ...limMeses, venta: parseInt(e.target.value) || 1 })} />
                </Field>
                <button style={mini()} onClick={() => setLimMeses(LIM_MESES_DEFECTO)}>Restablecer por defecto</button>
              </div>
              {(() => {
                const filas = bateas.flatMap((b) => alertasEdad(b).map((a) => ({ b, ...a })));
                return filas.length === 0 ? (
                  <p style={{ color: C.mut, fontSize: 14 }}>Sin cuerdas por encima del umbral de antigüedad ({limMeses.colectora} meses en colectora, {limMeses.desdoble} en mexilla, {limMeses.venta} en venta).</p>
                ) : (
                  <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}><table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead>
                      <tr style={{ color: C.mut, textAlign: "left" }}>
                        {["Batea", "Tipo", "Cuerdas afectadas", "Más antigua desde", "Umbral", "Sin fecha conocida"].map((h) => <th key={h} style={{ padding: "6px 8px", borderBottom: `1px solid ${C.line}` }}>{h}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {filas.map((f, i) => (
                        <tr key={i} style={{ borderBottom: `1px solid ${C.line}` }}>
                          <td style={{ padding: "7px 8px" }}>{f.b.nombre}</td>
                          <td style={{ padding: "7px 8px", color: CAT[f.cat].color }}>{CAT[f.cat].label}</td>
                          <td style={{ padding: "7px 8px", color: C.warn }}>{fmtN(f.vencidas)}</td>
                          <td style={{ padding: "7px 8px" }}>{f.antigua || "—"}</td>
                          <td style={{ padding: "7px 8px", color: C.mut }}>{f.lim} meses</td>
                          <td style={{ padding: "7px 8px", color: C.mut }}>{f.sinFecha ? fmtN(f.sinFecha) : "—"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table></div>
                );
              })()}
            </>
          );
        })()}

        {/* ── ANÁLISIS ── */}
        {tab === "analisis" && (() => {
          const vops = ops.filter((o) => o.tipo === "venta" &&
            (!fa.desde || o.fecha >= fa.desde) && (!fa.hasta || o.fecha <= fa.hasta) &&
            enB(fa.bateas, o.bateaId) && (!fa.modo || o.vmodo === fa.modo));
          const kgOp = (o) => o.vmodo === "sacos"
            ? (parseFloat(o.vsacos) || 0) * 10
            : (parseFloat(o.vkg) || 0) * (1 - (parseFloat(o.vdesct) || 0) / 100);
          const cuerdas = vops.reduce((s, o) => s + o.n, 0);
          const kg = vops.reduce((s, o) => s + kgOp(o), 0);
          const eur = vops.reduce((s, o) => s + totalVenta(o.base || 0), 0);
          const base = vops.reduce((s, o) => s + (o.base || 0), 0);
          const sacosOps = vops.filter((o) => o.vmodo === "sacos");
          const sacos = sacosOps.reduce((s, o) => s + (parseFloat(o.vsacos) || 0), 0);
          const cuerdasSacos = sacosOps.reduce((s, o) => s + o.n, 0);
          const granelOps = vops.filter((o) => o.vmodo === "granel");
          const kgBrutos = granelOps.reduce((s, o) => s + (parseFloat(o.vkg) || 0), 0);
          const desctPond = kgBrutos > 0
            ? granelOps.reduce((s, o) => s + (parseFloat(o.vdesct) || 0) * (parseFloat(o.vkg) || 0), 0) / kgBrutos
            : null;
          const dec = (n, d = 1) => n.toLocaleString("es-ES", { maximumFractionDigits: d });
          const stats = [
            ["Ventas", fmtN(vops.length), C.text],
            ["Cuerdas vendidas", fmtN(cuerdas), C.foam],
            ["Kg vendidos", dec(kg, 0), C.text],
            ["Kg / cuerda", cuerdas > 0 ? dec(kg / cuerdas) : "—", C.foam],
            ["Sacos / cuerda", cuerdasSacos > 0 ? dec(sacos / cuerdasSacos) : "—", C.rope],
            ["Precio medio €/kg", kg > 0 ? dec(base / kg, 3) : "—", C.text],
            ["Descuento medio %", desctPond !== null ? dec(desctPond) : "—", C.pink],
            ["€ / cuerda", cuerdas > 0 ? fmtEUR(eur / cuerdas) : "—", C.foam],
            ["Facturación", fmtEUR(eur), C.text],
          ];
          const porBatea = bateas.map((b) => {
            const bo = vops.filter((o) => o.bateaId === b.id);
            const bc = bo.reduce((s, o) => s + o.n, 0), bk = bo.reduce((s, o) => s + kgOp(o), 0);
            return { b, n: bo.length, bc, bk, be: bo.reduce((s, o) => s + totalVenta(o.base || 0), 0) };
          }).filter((r) => r.n > 0);
          const porMes = Object.values(vops.reduce((acc, o) => {
            const m = o.fecha.slice(0, 7);
            acc[m] = acc[m] || { m, kg: 0, eur: 0 };
            acc[m].kg += kgOp(o);
            acc[m].eur += totalVenta(o.base || 0);
            return acc;
          }, {})).sort((a, b) => a.m.localeCompare(b.m));
          return (
            <>
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "flex-end", marginBottom: 16, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 10, padding: 14 }}>
                <FechaFiltro f={fa} setF={setFa} />
                <Field label="Tipo" w={130}>
                  <select style={inp} value={fa.modo} onChange={(e) => setFa({ ...fa, modo: e.target.value })}>
                    <option value="">Todos</option><option value="sacos">Bolsas</option><option value="granel">Granel</option>
                  </select>
                </Field>
                <Field label="Bateas" w={220}><BChips f={fa} setF={setFa} /></Field>
                <button style={btn(false)} onClick={() => setFa({ desde: "", hasta: "", bateas: [], modo: "" })}>Limpiar</button>
                <button style={btn(false)} onClick={() => descargarCSV("analisis_ventas.csv",
                  ["Fecha", "Batea", "Modo", "Cuerdas", "Kg", "€ base", "€ total", "Nota"],
                  vops.map((o) => [o.fecha, bn(o.bateaId), o.vmodo, o.n, dec(kgOp(o), 2), (o.base || 0).toFixed(2), totalVenta(o.base || 0).toFixed(2), o.nota || ""]))}>
                  Exportar CSV
                </button>
              </div>
              {vops.length === 0 ? (
                <p style={{ color: C.mut, fontSize: 14 }}>No hay ventas en el rango filtrado. Las estadísticas se calculan sobre operaciones de Venta / cosecha.</p>
              ) : (
                <>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(min(100%,190px),1fr))", gap: 14 }}>
                    {stats.map(([t, v, col]) => (
                      <div key={t} style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 10, padding: "12px 16px" }}>
                        <div style={lbl}>{t}</div>
                        <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 24, fontWeight: 700, color: col }}>{v}</div>
                      </div>
                    ))}
                  </div>
                  {porBatea.length > 0 && (
                    <>
                      <h3 style={h3}>Rendimiento por batea</h3>
                      <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}><table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                        <thead>
                          <tr style={{ color: C.mut, textAlign: "left" }}>
                            {["Batea", "Ventas", "Cuerdas", "Kg", "Kg/cuerda", "€", "€/cuerda"].map((h) => <th key={h} style={{ padding: "6px 8px", borderBottom: `1px solid ${C.line}` }}>{h}</th>)}
                          </tr>
                        </thead>
                        <tbody>
                          {porBatea.map(({ b, n, bc, bk, be }) => (
                            <tr key={b.id} style={{ borderBottom: `1px solid ${C.line}` }}>
                              <td style={{ padding: "7px 8px" }}>{b.nombre}</td>
                              <td style={{ padding: "7px 8px" }}>{n}</td>
                              <td style={{ padding: "7px 8px" }}>{fmtN(bc)}</td>
                              <td style={{ padding: "7px 8px" }}>{dec(bk, 0)}</td>
                              <td style={{ padding: "7px 8px", color: C.foam }}>{bc > 0 ? dec(bk / bc) : "—"}</td>
                              <td style={{ padding: "7px 8px" }}>{fmtEUR(be)}</td>
                              <td style={{ padding: "7px 8px", color: C.foam }}>{bc > 0 ? fmtEUR(be / bc) : "—"}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table></div>
                    </>
                  )}
                  {porMes.length > 1 && (
                    <>
                      <h3 style={h3}>Evolución mensual</h3>
                      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(min(100%,320px),1fr))", gap: 16 }}>
                        <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 10, padding: "12px 16px" }}>
                          <div style={lbl}>Kg vendidos / mes</div>
                          <BarChart data={porMes} valueKey="kg" color={C.foam} />
                        </div>
                        <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 10, padding: "12px 16px" }}>
                          <div style={lbl}>Facturación € / mes</div>
                          <BarChart data={porMes} valueKey="eur" color={C.rope} />
                        </div>
                      </div>
                    </>
                  )}
                </>
              )}
            </>
          );
        })()}
      </main>

      <footer style={{ padding: "10px 24px 20px", color: C.mut, fontSize: 12, borderTop: `1px solid ${C.line}` }}>
        Prototipo — datos en memoria (se pierden al recargar). Siguiente paso: persistencia en Supabase con RLS.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script></body></html>
